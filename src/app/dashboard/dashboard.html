<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Ventas</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <main class="main-container">
        <h1 class="titulo-pagina">Dashboard de Ventas</h1>
        <section class="dashboard-grid"><!-- NUEVA: dashboard-grid -->
            <div class="dashboard-card">
                <h2>Ventas por Día/Mes/Año vs Año Anterior</h2>
                <canvas id="ventasComparadas"></canvas>
            </div>
            <div class="dashboard-card">
                <h2>Promedio de Venta por Mes</h2>
                <canvas id="promedioMensual"></canvas>
            </div>
            <div class="dashboard-card">
                <h2>Ganancias Totales por Día</h2>
                <canvas id="gananciasTotales"></canvas>
            </div>
            <div class="dashboard-card">
                <h2>Categorías Más Vendidas</h2>
                <canvas id="productosCategoria"></canvas>
            </div>
        </section>
    </main>
    <script src="dashboard.js"></script>
</body>
</html>
